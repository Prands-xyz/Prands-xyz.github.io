<!DOCTYPE html>
<html lang="tl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Safe AI Chatbot - Website Version</title>
<meta name="description" content="Offline + Online AI Chatbot. Quiz mode, chat export, dark mode. Safe & legal per PH Cybercrime Law RA 10175">
<style>
  :root {
    --bg: #f0f2f5; --box: #ffffff; --text: #1c1e21;
    --user: #0084ff; --bot: #e4e6eb; --border: #ddd;
  }
 .dark {
    --bg: #18191a; --box: #242526; --text: #e4e6eb;
    --bot: #3a3b3c; --border: #3a3b3c;
  }
    * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 20px; transition: 0.3s;
  }
 .container { max-width: 600px; width: 100%; }
 .chatbox {
    background: var(--box); border-radius: 20px;
    padding: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  }
  header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px;
  }
  h1 { font-size: 20px; }
  #status { font-size: 12px; color: green; margin-bottom: 12px; }
 .controls { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  #messages {
    height: 420px; overflow-y: auto; border: 1px solid var(--border);
    padding: 14px; margin-bottom: 12px; border-radius: 12px; scroll-behavior: smooth;
  }
 .msg {
    margin: 10px 0; padding: 12px 16px; border-radius: 18px;
    max-width: 85%; word-wrap: break-word; line-height: 1.4;
  }
 .user { background: var(--user); color: white; margin-left: auto; text-align: right; }
 .bot { background: var(--bot); color: var(--text); }
 .input-area { display: flex; gap: 8px; }
  input {
    flex: 1; padding: 12px 16px; border-radius: 24px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
    font-size: 15px;
  }
  input:focus { outline: 2px solid var(--user); }
  button {
    padding: 12px 18px; background: var(--user); color: white;
    border: none; border-radius: 12px; cursor: pointer; font-weight: 600;
  }
  button:hover { opacity: 0.9; transform: scale(0.98); }
 .icon-btn { padding: 8px 12px; font-size: 18px; }
  footer { font-size: 11px; color: gray; text-align: center; margin-top: 12px; }
  @media (max-width: 600px) {
   .chatbox { padding: 16px; }
    #messages { height: 55vh; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="chatbox">
    <header>
      <h1>🤖 Pro Safe AI Chatbot</h1>
      <button class="icon-btn" onclick="toggleDark()">🌙</button>
    </header>

    <p id="status">Offline Mode - Pro Safe Q&A</p>

    <div class="controls">
      <button onclick="startQuiz()">📝 Quiz Mode</button>
      <button onclick="exportChat()">💾 Export</button>
      <button onclick="clearChat()">🗑️ Clear</button>
    </div>

    <div id="messages"></div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ask about: coding, LTO, RA laws, math...">
      <button onclick="sendMsg()">Send</button>
    </div>

    <footer>Pro features: Offline Q&A, Quiz, Export. Safety ON per RA 10175 Cybercrime Law.</footer>
  </div>
</div>

<script>
let API_KEY = ""; // Optional: paste OpenAI/Meta API key here for online mode
let chatHistory = JSON.parse(localStorage.getItem("proAIchat") || "[]");
let quizMode = false, quizScore = 0, quizIndex = 0;

const quizBank = [
  {q: "Anong RA ang E-Commerce Act of 2000?", a: "ra 8792", opts: ["RA 10173", "RA 8792", "RA 8484"]},
  {q: "Ano ang capital ng Philippines?", a: "manila", opts: ["Cebu City", "Manila", "Davao City"]},
  {q: "Ilang provinces meron sa Sultan Kudarat?", a: "11", opts: ["9", "10", "11"]},
  {q: "Anong file extension ng Java source code?", a: "java", opts: [".class", ".java", ".jar"]},
  {q: "Ano tawag sa main ASEAN highway sa Mindanao?", a: "ah26", opts: ["AH26", "NLEX", "SLEX"]}
];

window.onload = () => {
  chatHistory.forEach(m => addMessage(m.text, m.sender, false));
  updateStatus();
}
window.addEventListener('online', updateStatus);
window.addEventListener('offline', updateStatus);

function updateStatus() {
  let s = document.getElementById("status");
  s.innerText = navigator.onLine && API_KEY? "Online Mode - AI API Connected" : "Offline Mode - Pro Safe Q&A";
  s.style.color = navigator.onLine && API_KEY? "green" : "orange";
}

function sendMsg() {
  let input = document.getElementById("userInput");
  let msg = input.value.trim();
  if(!msg) return;

  if(quizMode) { handleQuizAnswer(msg); input.value = ""; return; }

  addMessage(msg, "user");
  saveChat(msg, "user");
  input.value = "";

  // Safety filter - required by law
  if(msg.toLowerCase().match(/hack|malicious|illegal bomb|drug|fraud|phishing|ddos/)) {
    let reply = "Sorry boss, di ako pwede sumagot sa harmful/illegal requests per RA 10175 Cybercrime Prevention Act. Gusto mo ethical cybersecurity basics na lang?";
    addMessage(reply, "bot"); saveChat(reply, "bot"); return;
  }

  setTimeout(() => {
    let reply = getProReply(msg);
    addMessage(reply, "bot"); saveChat(reply, "bot");
  }, 400);
}

function getProReply(msg) {
  msg = msg.toLowerCase();
  if(msg.match(/hello|hi|kumusta/)) return "Hi boss! Pro mode activated. Try: 'quiz', 'java OOP', 'RA 8792', 'LTO OR guide', 'solve 2x+5=15'";
  if(msg.includes("java")) return "Java Pro Tip: OOP = Class + Object. Example: class Car{String brand;} Car c = new Car(); Need full code?";
  if(msg.includes("html")) return "HTML5 Pro: Use semantic tags <header><main><footer> + CSS Grid/Flexbox. Gawa tayo responsive template?";
  if(msg.includes("ra 8792")) return "RA 8792 E-Commerce Act: Ginagawang legal ang electronic documents, e-signatures, e-contracts sa Philippines. Admissible as evidence.";
  if(msg.includes("ra 10173")) return "RA 10173 Data Privacy Act: Protects personal info like name, address, TIN. Bawal leak ng data without consent.";
  if(msg.includes("lto") || msg.includes("or")) return "LTO OR Pro Tips: 1) Check OR No & Date 2) Verify Plate No 3) Valid Until date 4) Save PDF + cloud backup";
  if(msg.includes("math") || msg.match(/\d+[+\-*/]\d+/)) return "Math solver mode: Send equation like 'solve 3x + 9 = 24' → x = 5";
  return "Pro knowledge base loaded! Topics: Coding, PH Laws, LTO docs, Math, Business. Mas smart pag may API key + internet.";
}

// Quiz System
function startQuiz() {
  quizMode = true; quizScore = 0; quizIndex = 0;
  addMessage("📝 QUIZ MODE START! 5 questions. Reply A/B/C", "bot");
  askQuestion();
}

function askQuestion() {
  if(quizIndex >= quizBank.length) {
    let percent = (quizScore/quizBank.length)*100;
    addMessage(Quiz complete! Score: ${quizScore}/${quizBank.length} = ${percent}%\n${percent>=80?"Excellent! 🔥":percent>=60?"Good job! 👍":"Review ulit boss 💪"}, "bot");
    quizMode = false; return;
  }
  let q = quizBank[quizIndex];
  addMessage(${quizIndex+1}. ${q.q}\nA. ${q.opts[0]}\nB. ${q.opts[1]}\nC. ${q.opts[2]}, "bot");
}

function handleQuizAnswer(ans) {
  addMessage(ans, "
