<!DOCTYPE html>
<html lang="tl">
<head>
<meta charset="UTF-8">
<title>Pro Safe AI Chatbot v2.0</title>
<style>
  :root { --bg: #f0f2f5; --box: #fff; --text: #000; --user: #0084ff; --bot: #e4e6eb; }
  .dark { --bg: #18191a; --box: #242526; --text: #e4e6eb; --bot: #3a3b3c; }
  body { font-family: 'Segoe UI', Arial; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; transition: 0.3s; }
  .chatbox { width: 500px; background: var(--box); border-radius: 16px; padding: 20px; box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
  h3 { margin: 0 0 10px; display: flex; justify-content: space-between; align-items: center; }
  #status { font-size: 12px; color: green; margin-bottom: 10px; }
  #messages { height: 350px; overflow-y: auto; border: 1px solid #5553; padding: 12px; margin-bottom: 10px; border-radius: 10px; }
  .msg { margin: 8px 0; padding: 10px 14px; border-radius: 12px; max-width: 80%; word-wrap: break-word; }
  .user { background: var(--user); color: white; margin-left: auto; text-align: right; }
  .bot { background: var(--bot); color: var(--text); }
  .controls { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #5553; background: var(--bg); color: var(--text); }
  button { padding: 10px 14px; background: var(--user); color: white; border: none; border-radius: 8px; cursor: pointer; }
  button:hover { opacity: 0.9; }
  .note { font-size: 11px; color: gray; text-align: center; margin-top: 8px; }
</style>
</head>
<body>
<div class="chatbox">
  <h3>🤖 Pro AI Chatbot <button onclick="toggleDark()">🌙</button></h3>
  <p id="status">Offline Mode - Pro Safe Q&A</p>
  
  <div class="controls">
    <button onclick="startQuiz()">📝 Quiz Mode</button>
    <button onclick="exportChat()">💾 Export TXT</button>
    <button onclick="clearChat()">🗑️ Clear</button>
  </div>

  <div id="messages"></div>
  <div style="display:flex;gap:8px">
    <input type="text" id="userInput" placeholder="Magtanong: coding, LTO, RA laws, math...">
    <button onclick="sendMsg()">Send</button>
  </div>
  <p class="note">Pro features: Offline Q&A, Quiz, Export. Safety filter ON per PH Cybercrime Law.</p>
</div>
